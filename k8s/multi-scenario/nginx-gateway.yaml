apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-config
  namespace: observability
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 256; }
    http {
      server {
        listen 3001;
        location / { proxy_pass http://gorrashop-frontend.gorrashop-s1.svc.cluster.local:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
      }
      server {
        listen 3002;
        location / { proxy_pass http://gorrashop-frontend.gorrashop-s2.svc.cluster.local:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
      }
      server {
        listen 3003;
        location / { proxy_pass http://gorrashop-frontend.gorrashop-s3.svc.cluster.local:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
      }
      server {
        listen 3004;
        location / { proxy_pass http://gorrashop-frontend.gorrashop-s4.svc.cluster.local:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
      }
      server {
        listen 3005;
        location / { proxy_pass http://gorrashop-frontend.gorrashop-s5.svc.cluster.local:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 3001
            - containerPort: 3002
            - containerPort: 3003
            - containerPort: 3004
            - containerPort: 3005
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: nginx-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: observability
spec:
  type: LoadBalancer
  selector:
    app: nginx-gateway
  ports:
    - name: s1
      port: 3001
      targetPort: 3001
    - name: s2
      port: 3002
      targetPort: 3002
    - name: s3
      port: 3003
      targetPort: 3003
    - name: s4
      port: 3004
      targetPort: 3004
    - name: s5
      port: 3005
      targetPort: 3005
