# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  DDOT Collector — Datadog Distribution of OpenTelemetry Collector          ║
# ║                                                                            ║
# ║  Este collector es el componente central del Escenario 1.                  ║
# ║  Recibe telemetría OTel (OTLP) de los apps y la envía a Datadog.          ║
# ║                                                                            ║
# ║  Pipeline: App ──OTLP gRPC/HTTP──▶ DDOT ──Datadog API──▶ Datadog         ║
# ║                                                                            ║
# ║  Ventaja vs OTel Collector genérico (S2):                                  ║
# ║    - Exporter nativo de Datadog incluido                                   ║
# ║    - Sin necesidad de configurar exportador comunitario                    ║
# ║    - Soporte directo de Datadog                                            ║
# ║                                                                            ║
# ║  Nota: Aunque se llama "DDOT", la imagen es otel/opentelemetry-collector- ║
# ║  contrib con el exporter de Datadog ya incluido.                           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ─── ConfigMap: Pipeline del Collector ─────────────────────────────────────────
# Define: receivers → processors → exporters
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ddot-collector-config
  namespace: observability
data:
  config.yaml: |
    # ── Receivers: cómo entra la telemetría ──
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317    # Puerto estándar OTLP gRPC
          http:
            endpoint: 0.0.0.0:4318    # Puerto estándar OTLP HTTP

    # ── Processors: transformaciones antes de exportar ──
    processors:
      batch:
        send_batch_size: 1000         # Agrupa spans/metrics antes de enviar
        timeout: 10s

      memory_limiter:
        check_interval: 1s
        limit_percentage: 75          # Protección contra OOM
        spike_limit_percentage: 15

      resourcedetection:
        detectors: [env, system]      # Detecta hostname, OS, etc.
        timeout: 5s

    # ── Exporters: a dónde va la telemetría ──
    exporters:
      datadog:
        api:
          key: ${DD_API_KEY}          # Inyectado desde Secret
          site: datadoghq.com

      debug:
        verbosity: normal             # Logs de debug en stdout del collector

    # ── Service: conecta receivers → processors → exporters ──
    service:
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters:  [datadog, debug]
        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters:  [datadog]
        logs:
          receivers:  [otlp]
          processors: [memory_limiter, batch]
          exporters:  [datadog]

# ─── Deployment del Collector ──────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddot-collector
  namespace: observability
  labels:
    app: ddot-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ddot-collector
  template:
    metadata:
      labels:
        app: ddot-collector
    spec:
      containers:
        - name: ddot-collector
          image: otel/opentelemetry-collector-contrib:0.114.0
          args:
            - --config=/conf/config.yaml
          env:
            # DD_API_KEY se lee del Secret para autenticar con Datadog
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: datadog-secret
                  key: api-key
          volumeMounts:
            - name: config
              mountPath: /conf
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: ddot-collector-config

# ─── Service: expone el collector para que los apps le envíen telemetría ──────
---
apiVersion: v1
kind: Service
metadata:
  name: ddot-collector
  namespace: observability
spec:
  selector:
    app: ddot-collector
  ports:
    # Los apps se conectan a ddot-collector.observability:4317
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
