# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Escenario 2 — OTel SDK → OTel Collector + Datadog Exporter → Datadog     ║
# ║  (NOTA: esta variante usa OTel SDK. Ver patch-backend/frontend.yaml        ║
# ║  para la variante DD SDK recomendada que se despliega actualmente)         ║
# ║                                                                            ║
# ║  Pipeline: App (OTel SDK) ──gRPC:4317──▶ OTel Collector ──DD Exp──▶ DD   ║
# ║                                                                            ║
# ║  Usa el OTel Collector comunitario con el Datadog Exporter como plugin.    ║
# ║  Es la opción más "estándar OTel" — vendor-neutral en el app, pero        ║
# ║  necesita configurar el exporter de Datadog en el collector.               ║
# ║                                                                            ║
# ║  Requiere:                                                                 ║
# ║    - [OTEL] Código de instrumentación en la app (Program.cs / instr.ts)    ║
# ║    - [OTEL] 8 NuGet / 7 npm packages                                      ║
# ║    - [OTEL] OTel Collector con Datadog Exporter configurado                ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gorrashop-backend
  namespace: gorrashop-s2
spec:
  template:
    metadata:
      labels:
        scenario: "2"
        pipeline: otel-collector
    spec:
      containers:
        - name: gorrashop-backend
          env:
            # [OTEL] Endpoint del OTel Collector comunitario
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: DD_ENV
              value: "scenario-2-otel"
            - name: DD_SERVICE
              value: "gorrashop-backend"
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_TAGS
              value: "scenario:2,pipeline:otel-collector"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=scenario-2-otel,scenario=2,pipeline=otel-collector"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gorrashop-frontend
  namespace: gorrashop-s2
spec:
  template:
    metadata:
      labels:
        scenario: "2"
        pipeline: otel-collector
    spec:
      containers:
        - name: gorrashop-frontend
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: DD_ENV
              value: "scenario-2-otel"
            - name: DD_SERVICE
              value: "gorrashop-frontend"
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_TAGS
              value: "scenario:2,pipeline:otel-collector"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=scenario-2-otel,scenario=2,pipeline=otel-collector"
