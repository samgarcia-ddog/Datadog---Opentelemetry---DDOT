# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  S2 Frontend — DD SDK auto-instrumentación (Next.js)                       ║
# ║                                                                            ║
# ║  Igual que el backend, el Admission Controller inyecta dd-trace-js (v5)    ║
# ║  automáticamente. El archivo instrumentation.ts se desactiva con           ║
# ║  NEXT_PUBLIC_OBSERVABILITY_ENABLED=false.                                  ║
# ║                                                                            ║
# ║  RUM (Real User Monitoring) habilitado para capturar sesiones del browser. ║
# ║  Code Origin no funciona en Next.js (solo Express/Fastify), pero se       ║
# ║  deja habilitado por si se añade soporte futuro.                           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
spec:
  template:
    metadata:
      labels:
        scenario: "2"
        pipeline: dd-sdk-ddot
        admission.datadoghq.com/enabled: "true"
      annotations:
        admission.datadoghq.com/enabled: "true"
        # dd-trace-js v5 — inyectado como init container
        admission.datadoghq.com/js-lib.version: "v5"
    spec:
      containers:
        - name: gorrashop-frontend
          env:
            # Apaga OTel SDK en instrumentation.ts
            - name: OBSERVABILITY_ENABLED
              value: "false"
            - name: NEXT_PUBLIC_OBSERVABILITY_ENABLED
              value: "false"
            # ── RUM (Real User Monitoring) ──
            # Captura sesiones de usuario en el browser
            # Application ID y Client Token se generan en Datadog UX Monitoring → RUM
            - name: DD_RUM_ENABLED
              value: "true"
            - name: DD_RUM_APPLICATION_ID
              value: "9f61ea6a-521f-47d2-a889-c432c20c2809"
            - name: DD_RUM_CLIENT_TOKEN
              value: "pub3ff63f3b479550cca4f2daac63d724de"
            # ── Unified Service Tags ──
            - name: DD_ENV
              value: "scenario-2-ddsdk-ddot"
            - name: DD_SERVICE
              value: "gorrashop-frontend"
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_TAGS
              value: "scenario:2,pipeline:dd-sdk-ddot"
            - name: DD_TRACE_SAMPLE_RATE
              value: "1.0"
            # ── Source Code Integration ──
            - name: DD_GIT_COMMIT_SHA
              value: "879150c2b0500c20335c69e6756680ab200ae731"
            - name: DD_GIT_REPOSITORY_URL
              value: "https://github.com/samgarcia-ddog/Datadog---Opentelemetry---DDOT"
            # Code Origin — habilitado pero Next.js no lo soporta aún (solo Express/Fastify)
            - name: DD_CODE_ORIGIN_FOR_SPANS_ENABLED
              value: "true"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=scenario-2-ddsdk-ddot,scenario=2,pipeline=dd-sdk-ddot"
