# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  S3 Backend — Strategic Merge Patch                                        ║
# ║  OTel SDK → DD Agent OTLP via hostPort                                    ║
# ║  Se aplica con: kubectl patch deployment gorrashop-backend                 ║
# ║    --type strategic --patch-file patch-backend.yaml -n gorrashop-s3        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
spec:
  template:
    metadata:
      labels:
        scenario: "3"
        pipeline: dd-agent-otlp
    spec:
      containers:
        - name: gorrashop-backend
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            # [OTEL] DD Agent OTLP receiver en el nodo (hostPort 4317)
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(HOST_IP):4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: DD_ENV
              value: "scenario-3-agent"
            - name: DD_SERVICE
              value: "gorrashop-backend"
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_TAGS
              value: "scenario:3,pipeline:dd-agent-otlp"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=scenario-3-agent,scenario=3,pipeline=dd-agent-otlp"
            # DBM — correlación parcial con OTel SDK
            - name: DD_DBM_PROPAGATION_MODE
              value: "service"
