# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  S5 Frontend — Pure OTel (100% Open Source)                                ║
# ║  Mismo OTel Collector que el backend → Jaeger + Prometheus + Grafana       ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
spec:
  template:
    metadata:
      labels:
        scenario: "5"
        pipeline: otel-collector-oss
    spec:
      containers:
        - name: gorrashop-frontend
          env:
            # [OTEL] OTel Collector comunitario
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: DD_ENV
              value: "scenario-5-otel-oss"
            - name: DD_SERVICE
              value: "gorrashop-frontend"
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_TAGS
              value: "scenario:5,pipeline:otel-collector-oss"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=scenario-5-otel-oss,scenario=5,pipeline=otel-collector-oss"
