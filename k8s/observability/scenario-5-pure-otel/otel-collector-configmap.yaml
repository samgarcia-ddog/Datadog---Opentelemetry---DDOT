apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-pure-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        send_batch_size: 1000
        timeout: 10s
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15

    exporters:
      # Métricas → Prometheus (scrape pull model)
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: gorrashop
        resource_to_telemetry_conversion:
          enabled: true

      # Trazas → Jaeger (OTLP)
      otlp/jaeger:
        endpoint: jaeger-collector.observability:4317
        tls:
          insecure: true

      # Debug
      debug:
        verbosity: normal

    service:
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, batch]
          exporters:  [otlp/jaeger, debug]
        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, batch]
          exporters:  [prometheus]
        logs:
          receivers:  [otlp]
          processors: [memory_limiter, batch]
          exporters:  [debug]

      telemetry:
        metrics:
          address: 0.0.0.0:8888
