# Helm values para Prometheus — chart: prometheus-community/prometheus
server:
  retention: "7d"
  resources:
    requests:
      cpu:    200m
      memory: 512Mi
    limits:
      cpu:    500m
      memory: 1Gi

# Scrape del OTel Collector
serverFiles:
  prometheus.yml:
    scrape_configs:
      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector-pure.observability:8889"]
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

      - job_name: gorrashop-backend
        static_configs:
          - targets: ["gorrashop-backend.gorrashop:8080"]
        metrics_path: /metrics

# Deshabilitar componentes innecesarios para el lab
alertmanager:
  enabled: false

pushgateway:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
